    <style>
        .fancybox__container {
            z-index: 999999999 !important;
        }
        .my-fancy-link{
            padding: 5px;
        }

        .truncate-text-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Ограничиваем текст до 2 строк */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis; /* Добавляем многоточие */
        }

        .my-fancy-link video, .my-fancy-link img, .my-fancy-link img {
            width: 120px;
            height: 80px;
        }

        @media (max-width: 768px) {
            .my-fancy-link video, .my-fancy-link img, .my-fancy-link img {
                width: 60px;
                height: 40px;
            }
        }

        .review-container {
            font-family: Arial, sans-serif;
            color: #333;
            max-width: 400px;
            margin: 0 auto;
        }

        .review-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .review-stars {
            font-size: 24px;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .review-message {
            font-size: 16px;
            line-height: 1.5;
        }
    </style>

                },
                {

                    "url": "https://ctmass.com/why-free"
                }
            ],
            "potentialAction": {

                "target": "https://ctmass.com/request/create?servicePath=:servicePath&customService=:customService",
                "query-input": "name=search_term_string"

        }
