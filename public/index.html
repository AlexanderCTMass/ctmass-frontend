<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="manifest" href="/manifest.json"/>
    <!--  Favicon  -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
    <link rel="icon" href="/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"/>
    <!--  Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com"/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400&display=swap"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap"/>
    <!--  Vendors  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick-theme.min.css"/>

    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css" />
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css" />
    <style>
        .fancybox__container {
            z-index: 999999999 !important;
        }
        .my-fancy-link{
            padding: 5px;
        }

        .truncate-text-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Ограничиваем текст до 2 строк */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis; /* Добавляем многоточие */
        }

        .my-fancy-link video, .my-fancy-link img, .my-fancy-link img {
            width: 120px;
            height: 80px;
        }

        @media (max-width: 768px) {
            .my-fancy-link video, .my-fancy-link img, .my-fancy-link img {
                width: 60px;
                height: 40px;
            }
        }

        .review-container {
            font-family: Arial, sans-serif;
            color: #333;
            max-width: 400px;
            margin: 0 auto;
        }

        .review-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .review-stars {
            font-size: 24px;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .review-message {
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
    <title>CTMASS.com</title>
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebPage",
            "name": "CTMASS - Find a specialist for your project",
            "description": "Platform connecting homeowners with construction professionals in Connecticut and Massachusetts. Free service for finding specialists, managing projects, and leaving reviews.",
            "url": "https://ctmass.com",
            "mainEntityOfPage": {
                "@type": "WebPage",
                "@id": "https://ctmass.com"
            },
            "publisher": {
                "@type": "Organization",
                "name": "CTMASS",
                "logo": {
                    "@type": "ImageObject",
                    "url": "https://ctmass.com/assets/logo.png"
                }
            },
            "breadcrumb": {
                "@type": "BreadcrumbList",
                "itemListElement": [
                    {
                        "@type": "ListItem",
                        "position": 1,
                        "name": "Home",
                        "item": "https://ctmass.com"
                    }
                ]
            },
            "potentialAction": {
                "@type": "SearchAction",
                "target": "https://ctmass.com/search?q={search_term_string}",
                "query-input": "required name=search_term_string"
            },
            "about": [
                {
                    "@type": "Service",
                    "name": "Construction Specialist Matching",
                    "description": "Connects homeowners with vetted construction professionals for home improvement projects",
                    "serviceType": "construction services",
                    "areaServed": {
                        "@type": "State",
                        "name": ["Connecticut", "Massachusetts"]
                    },
                    "offers": {
                        "@type": "Offer",
                        "price": "0",
                        "priceCurrency": "USD",
                        "description": "Free service for homeowners"
                    }
                },
                {
                    "@type": "Service",
                    "name": "Professional Service Platform",
                    "description": "Platform for contractors to advertise services, find clients and manage projects",
                    "serviceType": "business service",
                    "offers": {
                        "@type": "Offer",
                        "price": "0",
                        "priceCurrency": "USD",
                        "description": "Free registration for service providers"
                    }
                }
            ],
            "mainContent": [
                {
                    "@type": "HowTo",
                    "name": "How to use CTMASS platform",
                    "step": [
                        {
                            "@type": "HowToStep",
                            "text": "Submit Request - Post your project request with details to attract the right specialists"
                        },
                        {
                            "@type": "HowToStep",
                            "text": "Receive Responses - Specialists will review your projects and submit their proposals"
                        },
                        {
                            "@type": "HowToStep",
                            "text": "Select Specialist - Evaluate proposals, check reviews, and choose the best specialist"
                        },
                        {
                            "@type": "HowToStep",
                            "text": "Leave a Review - Share your experience after project completion"
                        }
                    ]
                },
                {
                    "@type": "ItemList",
                    "name": "Platform Statistics",
                    "itemListElement": [
                        {
                            "@type": "ListItem",
                            "position": 1,
                            "item": {
                                "@type": "QuantitativeValue",
                                "value": "57",
                                "unitText": "professionals",
                                "description": "professionals already with us"
                            }
                        },
                        {
                            "@type": "ListItem",
                            "position": 2,
                            "item": {
                                "@type": "QuantitativeValue",
                                "value": "64",
                                "unitText": "projects",
                                "description": "projects successfully completed"
                            }
                        }
                    ]
                }
            ],
            "audience": [
                {
                    "@type": "Audience",
                    "audienceType": "homeowners",
                    "description": "People looking for construction services for residential projects"
                },
                {
                    "@type": "Audience",
                    "audienceType": "contractors",
                    "description": "Construction professionals offering services"
                },
                {
                    "@type": "Audience",
                    "audienceType": "business partners",
                    "description": "Companies interested in collaborating in the construction industry"
                }
            ],
            "contactPoint": {
                "@type": "ContactPoint",
                "contactType": "customer support",
                "email": "support@ctmass.com",
                "telephone": "+1 (413) 430-9679",
                "address": {
                    "@type": "PostalAddress",
                    "addressLocality": "Amherst",
                    "addressRegion": "MA",
                    "postalCode": "01002",
                    "addressCountry": "US"
                }
            }
        }
    </script>
</head>
